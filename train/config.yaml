# --------------------------------------------------------------------------
# Contact head training — slim, single source of truth.
# Everything not listed here uses the SAM-3D-Body checkpoint's model_config.
# --------------------------------------------------------------------------

model:
  # SAM-3D-Body base (DINOv3-H + frozen decoder).
  checkpoint_path: /data3/rikhat.akizhanov/.cache/huggingface/hub/models--facebook--sam-3d-body-dinov3/snapshots/11aaa346c7204874a1cbafe3d39a979080b2c55a/model.ckpt
  mhr_model_path:  /data3/rikhat.akizhanov/.cache/huggingface/hub/models--facebook--sam-3d-body-dinov3/snapshots/11aaa346c7204874a1cbafe3d39a979080b2c55a/assets/mhr_model.pt

  # New contact head: 21 keypoint-anchored tokens + extra global tokens,
  # MLP head that predicts per-vertex contact in SMPL-6890 topology.
  contact_head:
    num_keypoint_tokens: 21
    num_global_tokens:   3
    num_vertices:        6890       # SMPL — matches DAMON GT directly
    mlp_depth:           4
    mlp_channel_div_factor: 2
    pool_mode:           concat     # 'concat' or 'attention'
    dropout:             0.1
    grid_size:           5          # K x K image-feature grid per keypoint
    grid_radius:         0.1

  # Use the pretrained SAM-3D-Body mask conditioning (v2 — weights ship
  # with the checkpoint, frozen during contact training).
  mask_embed_type: v2

data:
  dataset_config: configs/damon.yaml  # uses DamonDataset.from_config
  val_ratio: 0.15
  seed:      42
  batch_size: 32
  num_workers: 16

loss:
  focal_alpha:     0.75   # >0.5 upweights the rare positive class
  focal_gamma:     2.0
  focal_weight:    5.0
  dice_weight:     0.5
  dice_eps:        1.0e-5
  sparsity_weight: 0.002

optim:
  lr:            1.0e-4
  weight_decay:  1.0e-4
  epochs:        50
  warmup_epochs: 1
  lr_min:        1.0e-5
  grad_clip:     1.0

output:
  dir:        ./train/output
  exp_name:   contact
  log_freq:   10           # train scalars every N steps
  val_freq:   1            # epochs
  save_freq:  5            # periodic full-state checkpoints (epochs)
