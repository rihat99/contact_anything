name: damon

# Raw dataset paths
data:
  root: /data3/rikhat.akizhanov/datasets/DECO
  splits:
    trainval: datasets/Release_Datasets/damon/hot_dca_trainval.npz
    test:     datasets/Release_Datasets/damon/hot_dca_test.npz

# Precomputed artefacts (one folder per dataset under ../data)
masks:
