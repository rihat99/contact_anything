# Camera intrinsics estimated by MoGe2 (absolute-pixel 3x3 K).
# One .npz per split, keyed by sample index. See
# scripts/precompute_cam_params_damon.py.
cam_params:
  dir: /data3/rikhat.akizhanov/better/data/damon/cam_params
