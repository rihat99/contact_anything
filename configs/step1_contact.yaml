# Step 1: InteractionDecoder + ContactHead + PartContactHead
#
# Architecture:
#   Precomputed DINOv3 features → frozen SAM-3D body decoder → pose token (detached)
#   Image features + pose token → InteractionDecoder (25 tokens: 24 part + 1 vertex)
#   part tokens  [:, :24, :] → PartContactHead → 24 per-body-part logits  (auxiliary)
#   vertex token [:, 24:, :] → ContactHead     → 6890 per-vertex logits   (primary)

MODEL:
  CHECKPOINT_PATH: data/sam-3d-body-checkpoints/sam-3d-body-dinov3/model.ckpt
  MHR_MODEL_PATH: data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
  IMAGE_SIZE:
  - 896
  - 896
  IMAGE_MEAN:
  - 0.485
  - 0.456
  - 0.406
  IMAGE_STD:
  - 0.229
  - 0.224
  - 0.225
  SMPL_MODEL_PATH: data/SMPL_NEUTRAL.npz
  BACKBONE:
    TYPE: dinov3_vith16plus
    FROZEN: true
    DROP_PATH_RATE: 0.1
  DECODER:
    DIM: 1024
    FROZEN: true
    DO_KEYPOINT_TOKENS: true
    DO_KEYPOINT3D_TOKENS: true
    CONDITION_TYPE: cliff
    USE_INTRIN_CENTER: false
  PROMPT_ENCODER:
    ENABLE: true
    MAX_NUM_CLICKS: 1
    PROMPT_KEYPOINTS: mhr70
    MASK_EMBED_TYPE: null
  MHR_HEAD:
    MHR_MODEL_PATH: data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
  PERSON_HEAD:
    POSE_TYPE: mhr
    CAMERA_TYPE: perspective
  CAMERA_HEAD:
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
    DEFAULT_SCALE_FACTOR: 1.0

  # --- InteractionDecoder ---
  # Tokens are fixed: 24 body-part queries + 1 vertex query = 25 total.
  # NUM_CONTACT_TOKENS is no longer a parameter.
  INTERACTION_DECODER:
    NUM_LAYERS: 4
    NUM_HEADS: 4
    FFN_DIM: 1024
    IMAGE_FEAT_DIM: 1280       # DINOv3-H backbone output channels
    D_MODEL: 1024              # Must match DECODER.DIM
    DROPOUT: 0.1
    MASK_BIAS_LAMBDA: 1.0      # Only active in Step 2 (object_mask provided)

  # --- ContactHead (per-vertex) ---
  CONTACT_HEAD:
    NUM_VERTICES: 6890         # SMPL vertex count
    MLP_DEPTH: 2
    HIDDEN_DIM: 512
    DROPOUT: 0.1

  # --- PartContactHead (per-body-part, auxiliary) ---
  # No params needed beyond d_model (taken from DECODER.DIM).
  PART_CONTACT_HEAD: {}

TRAIN:
  BATCH_SIZE: 64
  VAL_BATCH_SIZE: 64
  NUM_WORKERS: 16
  EPOCHS: 20
  LR: 1e-4
  WEIGHT_DECAY: 1e-1
  LR_SCHEDULER: cosine
  LR_WARMUP_EPOCHS: 1
  LR_MIN: 1e-5
  USE_FP16: false
  GRAD_CLIP: 1.0
  SAVE_FREQ: 5
  VAL_FREQ: 1
  RESUME: null
  USE_PRECOMPUTED_FEATURES: true
  PRECOMPUTED_FEATURES_DIR: ./dataset/damon_mhr_contact/features

DATASET:
  TOPOLOGY: smpl
  SMPL_PART_SEG_PATH: data/smpl_3d_segmentation.npy
  CONTACT_NPZ:
    TRAINVAL: /media/rikhat/4TB/rikhat/datasets/DECO/datasets/Release_Datasets/damon/hot_dca_trainval.npz
    TEST: /media/rikhat/4TB/rikhat/datasets/DECO/datasets/Release_Datasets/damon/hot_dca_test.npz
  DETECT_NPZ:
    TRAINVAL: ./dataset/damon_mhr_contact/hot_dca_trainval_detect.npz
    TEST: ./dataset/damon_mhr_contact/hot_dca_test_detect.npz
  DATA_ROOT: /media/rikhat/4TB/rikhat/datasets/DECO
  VAL_RATIO: 0.15
  SEED: 42

LOSS:
  # pos_weight for vertex BCE: compensates for ~14% contact rate (neg/pos ≈ 6).
  # Tunable: higher → more recall, lower → more precision.
  VERTEX_POS_WEIGHT: 10.0
  VERTEX_WEIGHT: 1.0
  PART_WEIGHT: 0.5             # Auxiliary part loss scale

OUTPUT:
  DIR: ./train/output
  EXP_NAME: step1_contact
  LOG_FREQ: 10
  USE_TENSORBOARD: true
