# Step 1: Interaction Decoder + Contact Head
# Implements proposal/step1_contact_tokens_and_head.md (PAL loss excluded).
#
# Architecture:
#   Image features (precomputed DINOv3) → frozen body decoder → pose token (detached)
#   Image features + pose token → InteractionDecoder → K contact tokens
#   Contact tokens → ContactHead → 18,439 per-vertex logits

MODEL:
  CHECKPOINT_PATH: /data3/rikhat.akizhanov/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/model.ckpt
  MHR_MODEL_PATH: /data3/rikhat.akizhanov/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
  IMAGE_SIZE:
  - 896
  - 896
  IMAGE_MEAN:
  - 0.485
  - 0.456
  - 0.406
  IMAGE_STD:
  - 0.229
  - 0.224
  - 0.225
  SMPL_MODEL_PATH: /data3/rikhat.akizhanov/human_global_motion/better_human/models/smpl/SMPL_NEUTRAL.npz
  BACKBONE:
    TYPE: dinov3_vith16plus
    FROZEN: true
    DROP_PATH_RATE: 0.1
  DECODER:
    DIM: 1024
    FROZEN: true
    DO_KEYPOINT_TOKENS: true
    DO_KEYPOINT3D_TOKENS: true
    CONDITION_TYPE: cliff
    USE_INTRIN_CENTER: false
  PROMPT_ENCODER:
    ENABLE: true
    MAX_NUM_CLICKS: 1
    PROMPT_KEYPOINTS: mhr70
    MASK_EMBED_TYPE: null
  MHR_HEAD:
    MHR_MODEL_PATH: /data3/rikhat.akizhanov/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
  PERSON_HEAD:
    POSE_TYPE: mhr
    CAMERA_TYPE: perspective
  CAMERA_HEAD:
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
    DEFAULT_SCALE_FACTOR: 1.0

  # --- Interaction Decoder (NEW) ---
  # Separate contact decoder; body->contact cross-attention is one-directional (detached).
  INTERACTION_DECODER:
    NUM_CONTACT_TOKENS: 8      # K learnable contact query tokens (reduced from 16)
    NUM_LAYERS: 4              # Transformer decoder depth
    NUM_HEADS: 8               # Attention heads per layer
    FFN_DIM: 2048              # FFN hidden dim per layer
    IMAGE_FEAT_DIM: 1280       # Backbone output channels (DINOv3-H)
    D_MODEL: 1024              # Must match DECODER.DIM
    DROPOUT: 0.1               # Dropout after each cross-attn sub-layer

  # --- Contact Head (NEW) ---
  CONTACT_HEAD:
    NUM_VERTICES: 18439        # MHR LOD1 vertex count
    MLP_DEPTH: 2
    MLP_CHANNEL_DIV_FACTOR: 4  # hidden_dim = D_MODEL // 4 = 256
    POOL_MODE: attention       # 'attention' or 'mean'
    DROPOUT: 0.1

TRAIN:
  BATCH_SIZE: 32
  VAL_BATCH_SIZE: 32
  NUM_WORKERS: 16
  EPOCHS: 50
  LR: 1e-4
  WEIGHT_DECAY: 1e-1
  LR_SCHEDULER: cosine
  LR_WARMUP_EPOCHS: 1
  LR_MIN: 1e-5
  USE_FP16: false
  FP16_TYPE: float32
  GRAD_CLIP: 1.0
  SAVE_FREQ: 5
  VAL_FREQ: 1
  RESUME: null
  # Weight applied to out-of-bounds vertices in the loss (0.0 = ignore, 1.0 = treat as visible).
  OOB_VERTEX_WEIGHT: 1.0
  # --- Precomputed backbone features (skip DINOv3 at training time) ---
  USE_PRECOMPUTED_FEATURES: true
  PRECOMPUTED_FEATURES_DIR: ./dataset/damon_mhr_contact/features
  PRECOMPUTED_PREDICTIONS_DIR: ./dataset/damon_mhr_contact/predictionsd

DATASET:
  # MHR LOD level (0-6). Determines vertex count for contact labels.
  LOD: 1
  # Contact NPZ files (imgname + contact_label); LOD-specific.
  CONTACT_NPZ:
    TRAINVAL: ./dataset/damon_mhr_contact/hot_dca_trainval_contact_lod1.npz
    TEST: ./dataset/damon_mhr_contact/hot_dca_test_contact_lod1.npz
  # Detect NPZ files (imgname + bbox + cam_k); LOD-independent.
  DETECT_NPZ:
    TRAINVAL: ./dataset/damon_mhr_contact/hot_dca_trainval_detect.npz
    TEST: ./dataset/damon_mhr_contact/hot_dca_test_detect.npz
  # Original DECO NPZs with SMPL (6890-vertex) contact labels — used for SMPL-space evaluation.
  SMPL_TRAINVAL_NPZ: /data3/rikhat.akizhanov/DECO/datasets/Release_Datasets/damon/hot_dca_trainval.npz
  SMPL_TEST_NPZ: /data3/rikhat.akizhanov/DECO/datasets/Release_Datasets/damon/hot_dca_test.npz
  # Root directory containing the 'datasets/' folder referenced in imgname.
  DATA_ROOT: /data3/rikhat.akizhanov/DECO
  # Fraction of TRAINVAL samples held out for validation.
  VAL_RATIO: 0.15
  # Fixed random seed — ensures identical train/val split across all runs.
  SEED: 42

LOSS:
  # --- Focal BCE ---
  # alpha=0.75 → positives (contact ~14%) get 3x more weight than negatives.
  FOCAL_ALPHA: 0.75
  FOCAL_GAMMA: 2.0
  FOCAL_WEIGHT: 5.0
  # --- Dice ---
  DICE_WEIGHT: 0.5
  DICE_EPS: 1.0e-5
  # --- L1 Sparsity ---
  SPARSITY_WEIGHT: 0.002

OUTPUT:
  DIR: ./train/output
  EXP_NAME: step1_contact
  LOG_FREQ: 10
  USE_TENSORBOARD: true
