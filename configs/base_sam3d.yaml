# Base SAM-3D-Body model configuration (reference only).
# Documents the settings baked into the pretrained checkpoint.
# Not used directly by training scripts — included for reproducibility.

MODEL:
  CHECKPOINT_PATH: /data3/rikhat.akizhanov/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/model.ckpt
  MHR_MODEL_PATH: /data3/rikhat.akizhanov/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
  IMAGE_SIZE:
  - 896
  - 896
  IMAGE_MEAN:
  - 0.485
  - 0.456
  - 0.406
  IMAGE_STD:
  - 0.229
  - 0.224
  - 0.225
  BACKBONE:
    TYPE: dinov3_vith16plus   # DINOv3-H, 840M params; output: [B, 1280, 56, 56]
    FROZEN: true
    DROP_PATH_RATE: 0.1
  DECODER:
    TYPE: sam
    DIM: 1024
    FROZEN: true
    DEPTH: 4
    HEADS: 8
    DIM_HEAD: 128
    MLP_DIM: 2048
    LAYER_SCALE_INIT: 0.0
    DROP_RATE: 0.0
    ATTN_DROP_RATE: 0.0
    DROP_PATH_RATE: 0.0
    FFN_TYPE: origin
    ENABLE_TWOWAY: false
    REPEAT_PE: false
    DO_INTERM_PREDS: false
    DO_KEYPOINT_TOKENS: true
    DO_KEYPOINT3D_TOKENS: true
    CONDITION_TYPE: cliff
    USE_INTRIN_CENTER: false
  PROMPT_ENCODER:
    ENABLE: true
    MAX_NUM_CLICKS: 1
    PROMPT_KEYPOINTS: mhr70
    MASK_EMBED_TYPE: null
  MHR_HEAD:
    MHR_MODEL_PATH: /data3/rikhat.akizhanov/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
  PERSON_HEAD:
    POSE_TYPE: mhr
    CAMERA_TYPE: perspective
  CAMERA_HEAD:
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
    DEFAULT_SCALE_FACTOR: 1.0
