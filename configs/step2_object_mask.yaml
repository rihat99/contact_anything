# Step 2: InteractionDecoder + ContactHead + PartContactHead + Hard Mask Conditioning
#
# Builds on Step 1 by conditioning contact prediction on person + object masks:
#   union(person_mask, object_mask) → zero out image features outside combined region
#   InteractionDecoder only attends to features inside the human + object area.
#
# Training uses INSTANCE_ONLY=true: only instance_contact batches (mask always provided).

MODEL:
  CHECKPOINT_PATH: /data3/rikhat.akizhanov/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/model.ckpt
  MHR_MODEL_PATH: /data3/rikhat.akizhanov/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
  IMAGE_SIZE:
  - 896
  - 896
  IMAGE_MEAN:
  - 0.485
  - 0.456
  - 0.406
  IMAGE_STD:
  - 0.229
  - 0.224
  - 0.225
  SMPL_MODEL_PATH: /data3/rikhat.akizhanov/human_global_motion/better_human/models/smpl/SMPL_NEUTRAL.npz
  BACKBONE:
    TYPE: dinov3_vith16plus
    FROZEN: true
    DROP_PATH_RATE: 0.1
  DECODER:
    DIM: 1024
    FROZEN: true
    DO_KEYPOINT_TOKENS: true
    DO_KEYPOINT3D_TOKENS: true
    CONDITION_TYPE: cliff
    USE_INTRIN_CENTER: false
  PROMPT_ENCODER:
    ENABLE: true
    MAX_NUM_CLICKS: 1
    PROMPT_KEYPOINTS: mhr70
    MASK_EMBED_TYPE: null
  MHR_HEAD:
    MHR_MODEL_PATH: /data3/rikhat.akizhanov/human_global_motion/data/sam-3d-body-checkpoints/sam-3d-body-dinov3/assets/mhr_model.pt
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
  PERSON_HEAD:
    POSE_TYPE: mhr
    CAMERA_TYPE: perspective
  CAMERA_HEAD:
    MLP_DEPTH: 1
    MLP_CHANNEL_DIV_FACTOR: 1
    DEFAULT_SCALE_FACTOR: 1.0

  INTERACTION_DECODER:
    NUM_LAYERS: 4
    NUM_HEADS: 4
    FFN_DIM: 1024
    IMAGE_FEAT_DIM: 1280
    D_MODEL: 1024
    DROPOUT: 0.1

  CONTACT_HEAD:
    NUM_VERTICES: 6890
    MLP_DEPTH: 2
    HIDDEN_DIM: 512
    DROPOUT: 0.1

  PART_CONTACT_HEAD: {}

TRAIN:
  BATCH_SIZE: 64
  INSTANCE_BATCH_SIZE: 64
  VAL_BATCH_SIZE: 64
  NUM_WORKERS: 16
  EPOCHS: 20
  LR: 5e-5
  WEIGHT_DECAY: 1e-1
  LR_SCHEDULER: cosine
  LR_WARMUP_EPOCHS: 1
  LR_MIN: 1e-6
  USE_FP16: false
  GRAD_CLIP: 1.0
  SAVE_FREQ: 5
  VAL_FREQ: 1
  RESUME: null
  USE_PRECOMPUTED_FEATURES: true
  PRECOMPUTED_FEATURES_DIR: ./dataset/damon_mhr_contact/features
  STEP2_MODE: true
  INSTANCE_ONLY: true
  INSTANCE_FRACTION: 0.7
  STEP1_CHECKPOINT: null

DATASET:
  TOPOLOGY: smpl
  SMPL_PART_SEG_PATH: /data3/rikhat.akizhanov/human_global_motion/better_human/src/better_human/smpl/config/smpl_3d_segmentation.npy
  CONTACT_NPZ:
    TRAINVAL: /data3/rikhat.akizhanov/DECO/datasets/Release_Datasets/damon/hot_dca_trainval.npz
    TEST: /data3/rikhat.akizhanov/DECO/datasets/Release_Datasets/damon/hot_dca_test.npz
  DETECT_NPZ:
    TRAINVAL: ./dataset/damon_mhr_contact/hot_dca_trainval_detect.npz
    TEST: ./dataset/damon_mhr_contact/hot_dca_test_detect.npz
  DATA_ROOT: /data3/rikhat.akizhanov/DECO
  VAL_RATIO: 0.15
  SEED: 42
  MASKS_V2_DIR: ./dataset/damon_mhr_contact/masks_v2

LOSS:
  VERTEX_POS_WEIGHT: 6.0
  VERTEX_WEIGHT: 1.0
  PART_WEIGHT: 1.0

OUTPUT:
  DIR: ./train/output
  EXP_NAME: step2_object_mask
  LOG_FREQ: 10
  USE_TENSORBOARD: true
